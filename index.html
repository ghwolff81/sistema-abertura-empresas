<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Abertura - Sempre Certo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@400;500;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #0f4c3a 0%, #1a6b52 100%); color: white; padding: 30px; border-radius: 12px; margin-bottom: 30px; }
        .header h1 { font-family: 'Montserrat', sans-serif; font-size: 32px; margin-bottom: 10px; }
        .sync-buttons { margin-top: 15px; display: flex; gap: 10px; }
        .sync-btn { padding: 8px 12px; background: rgba(255,255,255,0.2); border: 1px solid white; color: white; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; }
        .sync-btn:hover { background: rgba(255,255,255,0.3); }
        .content { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .left-panel { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-height: 80vh; overflow-y: auto; }
        .add-section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 2px solid #f0f0f0; }
        .add-section input { width: 100%; padding: 10px; margin-bottom: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 13px; }
        .add-section input:focus { outline: none; border-color: #0f4c3a; }
        .add-section button { width: 100%; padding: 10px; background: #0f4c3a; color: white; border: none; border-radius: 8px; font-family: 'Poppins', sans-serif; font-weight: 600; cursor: pointer; font-size: 13px; }
        .add-section button:hover { background: #0d3d2e; }
        .cliente-item { padding: 12px; background: #f8fafb; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; margin-bottom: 10px; transition: all 0.3s; font-size: 13px; }
        .cliente-item:hover { border-color: #0f4c3a; background: #f0f8f6; }
        .cliente-item.active { background: #0f4c3a; color: white; border-color: #0f4c3a; }
        .cliente-nome { font-weight: 600; margin-bottom: 4px; }
        .cliente-progresso { font-size: 11px; opacity: 0.8; }
        .right-panel { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-height: 80vh; overflow-y: auto; }
        .cliente-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #f0f0f0; }
        .cliente-header h2 { font-size: 24px; color: #0f4c3a; }
        .cliente-info { font-size: 13px; color: #666; line-height: 1.6; }
        .btn-delete { padding: 8px 16px; background: #ff6b6b; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
        .btn-delete:hover { background: #ff5252; }
        .blocos-container { display: flex; flex-direction: column; gap: 20px; }
        .bloco { background: #f8fafb; border-left: 4px solid #0f4c3a; border-radius: 8px; padding: 20px; }
        .bloco.bloco-0 { border-left-color: #ffd93d; }
        .bloco.bloco-1 { border-left-color: #6bcf7f; }
        .bloco.bloco-2 { border-left-color: #4d96ff; }
        .bloco.bloco-3 { border-left-color: #9d84b7; }
        .bloco-title { font-size: 16px; font-weight: 700; color: #0f4c3a; margin-bottom: 15px; }
        .sub-etapa { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 8px; }
        .sub-etapa input { width: 18px; height: 18px; cursor: pointer; }
        .sub-etapa label { cursor: pointer; flex: 1; }
        .sub-etapa-data { font-size: 11px; color: #6bcf7f; margin-left: auto; }
        .bloco-status { font-size: 12px; color: #0f4c3a; font-weight: 600; background: #f0f8f6; padding: 8px 12px; border-radius: 4px; text-align: center; }
        .empty-state { display: flex; align-items: center; justify-content: center; height: 400px; color: #999; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Sistema de Abertura de Empresas</h1>
            <p>Sempre Certo Contabilidade - Gestão de Projetos</p>
            <div class="sync-buttons">
                <button class="sync-btn" onclick="exportarDados()">💾 Exportar Dados</button>
                <button class="sync-btn" onclick="document.getElementById('importFile').click()">📥 Importar Dados</button>
                <input type="file" id="importFile" style="display:none" onchange="importarDados(event)">
            </div>
        </div>
        <div class="content">
            <div class="left-panel">
                <div class="add-section">
                    <input type="text" id="nomeCliente" placeholder="Nome da empresa">
                    <input type="text" id="telefoneCliente" placeholder="Telefone (opcional)">
                    <input type="text" id="emailCliente" placeholder="Email (opcional)">
                    <button onclick="adicionarCliente()">➕ Adicionar Cliente</button>
                </div>
                <div id="clientesList"></div>
            </div>
            <div class="right-panel">
                <div id="detalhes">
                    <div class="empty-state">
                        <p>👈 Selecione um cliente ou crie um novo</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let clientes = [];
        let clienteAtivo = null;

        const BLOCOS = [
            {
                id: 0,
                nome: '📋 BLOCO 0: Orçamento e Aprovação',
                etapas: ['Orçamento enviado', 'Orçamento aprovado pelo cliente']
            },
            {
                id: 1,
                nome: '📄 BLOCO 1: Documentação',
                etapas: [
                    'Criar pastas no servidor (grupo societário)',
                    'Cópia RG e CPF de todos os sócios',
                    'Comprovante de endereço dos sócios',
                    'Ato de constituição (se houver)',
                    'Documento de identidade do representante',
                    'Comprovante de endereço da empresa',
                    'Lista de atividades econômicas',
                    'Dados de contato completos',
                    'Dados da empresa (razão social, nome fantasia)',
                    'Declaração de enquadramento tributário',
                    'Documentação de participação societária',
                    'Endereço de e-mail corporativo',
                    'Telefone comercial'
                ]
            },
            {
                id: 2,
                nome: '🏢 BLOCO 2: Abertura',
                etapas: [
                    'Consulta Prévia',
                    'Protocolo DBE enviado',
                    'FCN preenchido',
                    'Contrato Social assinado',
                    'Taxa paga',
                    'Protocolo da abertura',
                    'CNPJ recebido',
                    'Inscrição Estadual',
                    'Inscrição Municipal',
                    'Alvará',
                    'Certificado de Bombeiros',
                    'Licenças especiais'
                ]
            },
            {
                id: 3,
                nome: '💻 BLOCO 3: Sistema e Onboarding',
                etapas: [
                    'Cadastro Receita Estadual',
                    'Autorização NF-e',
                    'Senha Prefeitura',
                    'Parametrização sistema',
                    'Cadastro DJE',
                    'Contrato Prestação enviado',
                    'Contrato assinado',
                    'Cadastro Domínio Contábil',
                    'Período inicial',
                    'Primeira movimentação',
                    'SEG Paraná',
                    'NF-e configurada',
                    'Pasta Drive',
                    'Instruções cliente',
                    'PRONTO PARA CONTABILIDADE'
                ]
            }
        ];

        function carregarDados() {
            const dados = localStorage.getItem('clientes');
            if (dados) clientes = JSON.parse(dados);
            renderizarClientes();
        }

        function salvarDados() {
            localStorage.setItem('clientes', JSON.stringify(clientes));
            renderizarClientes();
            if (clienteAtivo) renderizarDetalhes(clienteAtivo);
        }

        function adicionarCliente() {
            const nome = document.getElementById('nomeCliente').value.trim();
            if (!nome) {
                alert('Digite o nome da empresa');
                return;
            }

            const cliente = {
                id: Date.now(),
                nome: nome,
                telefone: document.getElementById('telefoneCliente').value.trim(),
                email: document.getElementById('emailCliente').value.trim(),
                blocos: BLOCOS.map(bloco => ({
                    id: bloco.id,
                    etapas: bloco.etapas.map(etapa => ({
                        texto: etapa,
                        completo: false,
                        data: null
                    }))
                })),
                dataCriacao: new Date().toLocaleDateString('pt-BR')
            };

            clientes.push(cliente);
            salvarDados();
            document.getElementById('nomeCliente').value = '';
            document.getElementById('telefoneCliente').value = '';
            document.getElementById('emailCliente').value = '';
            clienteAtivo = cliente.id;
            renderizarDetalhes(cliente.id);
        }

        function selecionarCliente(id) {
            clienteAtivo = id;
            renderizarClientes();
            renderizarDetalhes(id);
        }

        function deletarCliente(id) {
            if (confirm('Deletar este cliente?')) {
                clientes = clientes.filter(c => c.id !== id);
                if (clienteAtivo === id) clienteAtivo = null;
                salvarDados();
            }
        }

        function marcarEtapa(clienteId, blocoId, idx) {
            const cliente = clientes.find(c => c.id === clienteId);
            if (!cliente || !cliente.blocos) return;
            const bloco = cliente.blocos.find(b => b.id === blocoId);
            if (!bloco || !bloco.etapas) return;
            const etapa = bloco.etapas[idx];
            if (!etapa) return;
            etapa.completo = !etapa.completo;
            etapa.data = etapa.completo ? new Date().toLocaleDateString('pt-BR') : null;
            salvarDados();
        }

        function renderizarClientes() {
            const lista = document.getElementById('clientesList');
            if (!clientes.length) {
                lista.innerHTML = '<p style="text-align:center;color:#999;padding:20px">Nenhum cliente</p>';
                return;
            }
            lista.innerHTML = clientes.map(c => {
                const total = c.blocos.reduce((a, b) => a + (b.etapas ? b.etapas.length : 0), 0);
                const completas = c.blocos.reduce((a, b) => a + (b.etapas ? b.etapas.filter(e => e.completo).length : 0), 0);
                const perc = total > 0 ? Math.round((completas / total) * 100) : 0;
                return `<div class="cliente-item ${clienteAtivo === c.id ? 'active' : ''}" onclick="selecionarCliente(${c.id})"><div class="cliente-nome">${c.nome}</div><div class="cliente-progresso">${completas}/${total} etapas (${perc}%)</div></div>`;
            }).join('');
        }

        function renderizarDetalhes(id) {
            const cliente = clientes.find(c => c.id === id);
            const det = document.getElementById('detalhes');
            if (!cliente) {
                det.innerHTML = '<div class="empty-state"><p>Selecione um cliente</p></div>';
                return;
            }
            det.innerHTML = `
                <div class="cliente-header">
                    <div>
                        <h2>${cliente.nome}</h2>
                        <div class="cliente-info">
                            ${cliente.telefone ? '📱 ' + cliente.telefone + '<br>' : ''}
                            ${cliente.email ? '📧 ' + cliente.email + '<br>' : ''}
                            📅 ${cliente.dataCriacao}
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deletarCliente(${cliente.id})">🗑️ Deletar</button>
                </div>
                <div class="blocos-container">
                    ${cliente.blocos.map(bloco => {
                        const blocoInfo = BLOCOS.find(b => b.id === bloco.id);
                        if (!bloco.etapas) return '';
                        const completas = bloco.etapas.filter(e => e.completo).length;
                        const total = bloco.etapas.length;
                        return `
                            <div class="bloco bloco-${bloco.id}">
                                <div class="bloco-title">${blocoInfo.nome} (${completas}/${total})</div>
                                <div>
                                    ${bloco.etapas.map((e, i) => `
                                        <div class="sub-etapa">
                                            <input type="checkbox" ${e.completo ? 'checked' : ''} onchange="marcarEtapa(${cliente.id}, ${bloco.id}, ${i})">
                                            <label>${e.texto}</label>
                                            ${e.data ? '<div class="sub-etapa-data">✓ ' + e.data + '</div>' : ''}
                                        </div>
                                    `).join('')}
                                </div>
                                <div class="bloco-status">${completas === total ? '✅ Bloco Completo' : completas + ' de ' + total + ' etapas'}</div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function exportarDados() {
            const json = JSON.stringify(clientes, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'sistema-abertura-' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
        }

        function importarDados(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    clientes = JSON.parse(e.target.result);
                    salvarDados();
                    alert('✅ Dados importados com sucesso!');
                } catch (err) {
                    alert('❌ Erro ao importar: ' + err.message);
                }
            };
            reader.readAsText(file);
        }

        carregarDados();
    </script>
</body>
</html>
